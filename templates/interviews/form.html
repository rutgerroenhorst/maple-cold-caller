{% extends "../base.html" %}
{% block title %}{{ 'Edit' if interview else 'Schedule' }} Interview — Maple{% end %}

{% block header %}
<div class="flex items-center gap-2">
  <a href="/interviews" class="text-slate-400 hover:text-white text-sm">Interviews</a>
  <span class="text-slate-600">/</span>
  <h1 class="text-lg font-semibold text-white">{{ 'Edit' if interview else 'Schedule' }} Interview</h1>
</div>
{% end %}

{% block content %}
<div class="max-w-2xl">
  <form method="POST" action="{{ '/interviews/' + str(interview['id']) + '/edit' if interview else '/interviews/new' }}" class="space-y-6">

    <div class="bg-slate-800 border border-slate-700 rounded-xl p-5 space-y-4">
      <h2 class="font-semibold text-white text-sm border-b border-slate-700 pb-3">Interview Details</h2>

      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <div>
          <label class="block text-xs font-medium text-slate-400 mb-1">Candidate *</label>
          <select name="candidate_id" required class="w-full bg-slate-900 border border-slate-600 rounded-lg px-3 py-2 text-sm text-white focus:outline-none focus:border-indigo-500">
            <option value="">— Select Candidate —</option>
            {% for c in candidates %}
            <option value="{{ c['id'] }}" {% if interview and interview['candidate_id'] == c['id'] %}selected{% end %}
                    {% if preselect_candidate and preselect_candidate == c['id'] %}selected{% end %}>{{ c['full_name'] }}</option>
            {% end %}
          </select>
        </div>
        <div>
          <label class="block text-xs font-medium text-slate-400 mb-1">Campaign</label>
          <select name="campaign_id" class="w-full bg-slate-900 border border-slate-600 rounded-lg px-3 py-2 text-sm text-white focus:outline-none focus:border-indigo-500">
            <option value="">— None —</option>
            {% for c in campaigns %}
            <option value="{{ c['id'] }}" {% if interview and interview['campaign_id'] == c['id'] %}selected{% end %}
                    {% if preselect_campaign and preselect_campaign == c['id'] %}selected{% end %}>{{ c['client_name'] }}</option>
            {% end %}
          </select>
        </div>
        <div>
          <label class="block text-xs font-medium text-slate-400 mb-1">Date</label>
          <input type="date" name="interview_date" value="{{ interview['interview_date'] if interview else '' }}"
                 class="w-full bg-slate-900 border border-slate-600 rounded-lg px-3 py-2 text-sm text-white focus:outline-none focus:border-indigo-500"/>
        </div>
        <div>
          <label class="block text-xs font-medium text-slate-400 mb-1">Time</label>
          <input type="time" name="interview_time" value="{{ interview['interview_time'] if interview else '' }}"
                 class="w-full bg-slate-900 border border-slate-600 rounded-lg px-3 py-2 text-sm text-white focus:outline-none focus:border-indigo-500"/>
        </div>
        <div>
          <label class="block text-xs font-medium text-slate-400 mb-1">Format</label>
          <select name="interview_format" class="w-full bg-slate-900 border border-slate-600 rounded-lg px-3 py-2 text-sm text-white focus:outline-none focus:border-indigo-500">
            {% for opt in ['Video Call', 'Phone Call', 'In-Person', 'Async / Loom'] %}
            <option value="{{ opt }}" {% if interview and interview['interview_format'] == opt %}selected{% end %}>{{ opt }}</option>
            {% end %}
          </select>
        </div>
        <div>
          <label class="block text-xs font-medium text-slate-400 mb-1">Interviewer</label>
          <input type="text" name="interviewer" value="{{ interview['interviewer'] if interview else '' }}"
                 placeholder="Your name or team member"
                 class="w-full bg-slate-900 border border-slate-600 rounded-lg px-3 py-2 text-sm text-white focus:outline-none focus:border-indigo-500"/>
        </div>
        <div class="sm:col-span-2">
          <label class="block text-xs font-medium text-slate-400 mb-1">Meeting Link</label>
          <input type="text" name="meeting_link" value="{{ interview['meeting_link'] if interview else '' }}"
                 placeholder="https://zoom.us/..."
                 class="w-full bg-slate-900 border border-slate-600 rounded-lg px-3 py-2 text-sm text-white focus:outline-none focus:border-indigo-500"/>
        </div>
        <div>
          <label class="block text-xs font-medium text-slate-400 mb-1">Status</label>
          <select name="status" class="w-full bg-slate-900 border border-slate-600 rounded-lg px-3 py-2 text-sm text-white focus:outline-none focus:border-indigo-500">
            {% for opt in ['scheduled', 'completed', 'no_show', 'cancelled', 'rescheduled'] %}
            <option value="{{ opt }}" {% if interview and interview['status'] == opt %}selected{% end %}>{{ opt.replace('_', ' ').capitalize() }}</option>
            {% end %}
          </select>
        </div>
      </div>

      <div>
        <label class="block text-xs font-medium text-slate-400 mb-1">Notes</label>
        <textarea name="notes" rows="3"
                  class="w-full bg-slate-900 border border-slate-600 rounded-lg px-3 py-2 text-sm text-white focus:outline-none focus:border-indigo-500">{{ interview['notes'] if interview else '' }}</textarea>
      </div>

      <div>
        <label class="block text-xs font-medium text-slate-400 mb-1">Interview Result / Feedback</label>
        <textarea name="interview_result" rows="2" placeholder="Post-interview notes after completion..."
                  class="w-full bg-slate-900 border border-slate-600 rounded-lg px-3 py-2 text-sm text-white focus:outline-none focus:border-indigo-500">{{ interview['interview_result'] if interview else '' }}</textarea>
      </div>
    </div>

    <div class="flex gap-3">
      <button type="submit" class="bg-indigo-600 hover:bg-indigo-500 text-white text-sm font-medium px-5 py-2 rounded-lg transition-colors">
        {{ 'Save Changes' if interview else 'Schedule Interview' }}
      </button>
      <a href="{{ '/interviews/' + str(interview['id']) if interview else '/interviews' }}" class="bg-slate-700 hover:bg-slate-600 text-white text-sm font-medium px-5 py-2 rounded-lg transition-colors">
        Cancel
      </a>
    </div>
  </form>
</div>
{% end %}
