{% extends "../base.html" %}
{% block title %}Edit Task — Action Queue{% end %}

{% block header %}
<div class="flex items-center gap-2">
  <a href="/tasks" class="text-slate-400 hover:text-white text-sm">Action Queue</a>
  <span class="text-slate-600">/</span>
  <a href="/tasks/{{ task['id'] }}" class="text-slate-400 hover:text-white text-sm truncate">{{ task['title'] }}</a>
  <span class="text-slate-600">/</span>
  <h1 class="text-lg font-semibold text-white">Edit</h1>
</div>
{% end %}

{% block content %}
<div class="max-w-2xl">
  <form method="POST" action="/tasks/{{ task['id'] }}/edit" class="space-y-5">

    <div class="bg-slate-800 border border-slate-700 rounded-xl p-5 space-y-4">
      <h2 class="font-semibold text-white text-sm border-b border-slate-700 pb-3">Task Details</h2>

      <div>
        <label class="block text-xs font-medium text-slate-400 mb-1">Title</label>
        <input type="text" name="title" value="{{ task['title'] }}" required
               class="w-full bg-slate-900 border border-slate-600 rounded-lg px-3 py-2 text-sm text-white focus:outline-none focus:border-indigo-500"/>
      </div>

      <div>
        <label class="block text-xs font-medium text-slate-400 mb-1">Description</label>
        <textarea name="description" rows="2"
                  class="w-full bg-slate-900 border border-slate-600 rounded-lg px-3 py-2 text-sm text-white focus:outline-none focus:border-indigo-500">{{ task.get('description') or '' }}</textarea>
      </div>

      <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
        <div>
          <label class="block text-xs font-medium text-slate-400 mb-1">Priority</label>
          <select name="priority" class="w-full bg-slate-900 border border-slate-600 rounded-lg px-3 py-2 text-sm text-white focus:outline-none focus:border-indigo-500">
            {% for p in ['Low', 'Medium', 'High', 'Critical'] %}
            <option value="{{ p }}" {% if task.get('priority') == p %}selected{% end %}>{{ p }}</option>
            {% end %}
          </select>
        </div>
        <div>
          <label class="block text-xs font-medium text-slate-400 mb-1">Due Date</label>
          <input type="date" name="due_date" value="{{ task.get('due_date') or '' }}"
                 class="w-full bg-slate-900 border border-slate-600 rounded-lg px-3 py-2 text-sm text-white focus:outline-none focus:border-indigo-500"/>
        </div>
        <div>
          <label class="block text-xs font-medium text-slate-400 mb-1">Owner</label>
          <input type="text" name="owner" value="{{ task.get('owner') or '' }}"
                 placeholder="e.g. Rutger"
                 class="w-full bg-slate-900 border border-slate-600 rounded-lg px-3 py-2 text-sm text-white focus:outline-none focus:border-indigo-500"/>
        </div>
      </div>
    </div>

    <div class="bg-slate-800 border border-indigo-900/30 rounded-xl p-5 space-y-3">
      <h2 class="font-semibold text-white text-sm border-b border-slate-700 pb-3">Message</h2>
      <p class="text-xs text-slate-500">This is the text you will copy and send manually. Edit to personalise.</p>
      <textarea name="message" rows="10"
                class="w-full bg-slate-900 border border-indigo-900/40 rounded-lg px-3 py-2 text-sm text-slate-200 focus:outline-none focus:border-indigo-500 font-mono">{{ task.get('message') or '' }}</textarea>
    </div>

    <div class="bg-slate-800 border border-slate-700 rounded-xl p-5">
      <h2 class="font-semibold text-white text-sm border-b border-slate-700 pb-3 mb-3">Notes</h2>
      <textarea name="notes" rows="3"
                class="w-full bg-slate-900 border border-slate-600 rounded-lg px-3 py-2 text-sm text-white focus:outline-none focus:border-indigo-500">{{ task.get('notes') or '' }}</textarea>
    </div>

    <div class="flex gap-3">
      <button type="submit"
              class="bg-indigo-600 hover:bg-indigo-500 text-white text-sm font-medium px-5 py-2 rounded-lg transition-colors">
        Save Changes
      </button>
      <a href="/tasks/{{ task['id'] }}"
         class="bg-slate-700 hover:bg-slate-600 text-white text-sm font-medium px-5 py-2 rounded-lg transition-colors">
        Cancel
      </a>
    </div>
  </form>
</div>
{% end %}
