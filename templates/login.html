<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — Maple</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex items-center justify-center">
  <div class="w-full max-w-sm">
    <div class="text-center mb-8">
      <span class="text-4xl">🍁</span>
      <h1 class="text-2xl font-bold text-white mt-2">Maple</h1>
      <p class="text-slate-400 text-sm mt-1">Cold Caller Recruitment OS</p>
    </div>
    <div class="bg-slate-900 border border-slate-700 rounded-xl p-6">
      {% if error %}
      <div class="mb-4 bg-red-950/40 border border-red-900/40 rounded-lg px-4 py-3 text-sm text-red-400">
        {{ error }}
      </div>
      {% end %}
      <form method="POST" action="/login" class="space-y-4">
        <div>
          <label class="block text-xs font-medium text-slate-400 mb-1">Password</label>
          <input type="password" name="password" autofocus required
                 class="w-full bg-slate-800 border border-slate-600 rounded-lg px-3 py-2.5 text-sm text-white focus:outline-none focus:border-indigo-500 placeholder-slate-500"
                 placeholder="Enter app password"/>
        </div>
        <button type="submit"
                class="w-full bg-indigo-600 hover:bg-indigo-500 text-white text-sm font-semibold px-4 py-2.5 rounded-lg transition-colors">
          Sign In
        </button>
      </form>
    </div>
    <p class="text-center text-xs text-slate-600 mt-4">
      Set MAPLE_APP_PASSWORD in your environment to configure access.
    </p>
  </div>
</body>
</html>
